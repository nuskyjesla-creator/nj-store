<style>
        body {
            background-color: #fcf9f8;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background: radial-gradient(circle at 0% 0%, #bdd9c1 0%, transparent 50%),

                        radial-gradient(circle at 50% 50%, #fcf9f8 0%, transparent 100%);
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-between py-xl bg-mesh px-margin">
<!-- Decorative Header Element -->
<div class="w-full flex justify-center items-center opacity-40">
<div class="h-[1px] w-12 bg-primary"></div>
<span class="mx-md font-label-md text-label-md text-primary tracking-[0.2em] uppercase">Est. 2024</span>
<div class="h-[1px] w-12 bg-primary"></div>
</div>
<!-- Center Brand Identity -->
<div class="flex flex-col items-center text-center max-w-md">
<!-- Brand Logo from JSON Identity -->
<h1 class="text-emerald-900 font-headline-lg text-[48px] font-extrabold tracking-tighter mb-sm">
                NJ STORE
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] leading-relaxed">
                Curating timeless elegance and contemporary luxury.
            </p>
<!-- Decorative Visual: Level 1 Card with Product Focus -->
<div class="mt-xl relative">
<div class="w-64 h-80 rounded-lg overflow-hidden shadow-[0_20px_50px_rgba(75,100,81,0.08)] bg-white p-2">
<img alt="Fashion model" class="w-full h-full object-cover rounded-[1.5rem]" data-alt="Elegant fashion model in minimalist neutral toned high-fashion apparel against a soft beige studio background with editorial lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB5SuxItZd2D9oT1yYL0JucOmN6O3kswaj4fBUCmvC31K5qEwicPN8ZOJ_Ly4fu1SV_ys9iZjK4j41fep-0eaI75XKHIjCfYgLXKYDxuTUB64Z6VLQxaw8NYmvnM5ETQrkIfDauYbDG910aBKxoowM7zBoMPvURwtvTYfpohN7YBhch7IBSdxlNj5zerIYzKWnqdFMiZlH0VZyUHWS5Mb5GHtjEX9QcwhdABOpgGxbmXe9LlEhUmop8zWFHZdEdQg6IIqYMluYDTUU"/>
</div>
<!-- Subtle floating element -->
<div class="absolute -bottom-6 -right-6 w-32 h-32 bg-primary-container/30 backdrop-blur-md rounded-full -z-10"></div>
<div class="absolute -top-6 -left-6 w-24 h-24 bg-secondary-container/30 backdrop-blur-md rounded-full -z-10"></div>
</div>
</div>
<!-- Call to Action / Entry Point -->
<div class="w-full flex flex-col items-center gap-md">
<button class="w-full max-w-xs bg-primary text-on-primary py-4 rounded-full font-headline-sm text-headline-sm flex items-center justify-center gap-sm shadow-lg shadow-primary/10 transition-all active:scale-95 duration-150">
                Enter Boutique
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex gap-lg mt-sm">
<span class="font-label-md text-label-md text-on-surface-variant cursor-pointer hover:text-primary transition-colors">Sign In</span>
<span class="font-label-md text-label-md text-on-surface-variant cursor-pointer hover:text-primary transition-colors">Create Account</span>
</div>
</div>
</main>
<!-- Visual Polish: Subtle Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
