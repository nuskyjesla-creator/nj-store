<div class="w-6"></div>

</div>

</div>
<div class="relative">

</div>
<div class="relative">
<input class="w-full px-margin py-4 bg-surface-container-lowest border border-outline-variant rounded-full font-body-md focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all placeholder:text-stone-400" placeholder="Password" type="password"/>
</div>
<div class="relative">
<input class="w-full px-margin py-4 bg-surface-container-lowest border border-outline-variant rounded-full font-body-md focus:ring-2 focus:ring-primary-container focus:border-primary outline-none transition-all placeholder:text-stone-400" placeholder="Confirm Password" type="password"/>
</div>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-label-md rounded-full hover:opacity-90 active:scale-95 transition-all shadow-sm" type="button">
